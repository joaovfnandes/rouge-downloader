name: Build Windows portable

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build portable folder
        run: >-
          python -m PyInstaller --noconfirm --clean --onedir --name Rouge
          --add-data "templates:templates" --add-data "static:static" app.py

      - name: Add portable instructions
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\Rouge\nhentai_out | Out-Null
          Copy-Item COMO_USAR.txt dist\Rouge\COMO_USAR.txt
          Copy-Item GUIA_PORTATIL.md dist\Rouge\GUIA_PORTATIL.md
          Copy-Item README.md dist\Rouge\LEIA-ME.md
          Compress-Archive -Path dist\Rouge -DestinationPath Rouge-Windows-x64.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rouge-Windows-x64
          path: Rouge-Windows-x64.zip
          if-no-files-found: error
